name: Docker Build

on:
  push:
    branches: ["*"]
    tags: ["*"]
  #pull_request:
  #  branches: ["main"]

env:
  # Push to Docker Hub when: branch is main, push is a tag, or commit message contains "prerelease" (case-insensitive)
  push-to-registry: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || (github.event.head_commit && contains(toLower(github.event.head_commit.message), 'prerelease'))) }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Determine version
        id: gitversion
        run: |
          VERSION=$(dotnet gitversion /nofetch /verbosity quiet /showvariable InformationalVersion)
          echo "SemVer=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        if: env.push-to-registry == 'true'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: ${{ env.push-to-registry == 'true' }}
          build-args: |
            VERSION=${{ steps.gitversion.outputs.SemVer }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/graymoon:${{ steps.gitversion.outputs.SemVer }}
            ${{ secrets.DOCKERHUB_USERNAME }}/graymoon:latest
